name: Docs (MkDocs + GitHub Pages)

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "scripts/generate_push_log.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  register-and-build:
    name: Registrar push e buildar MkDocs
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.meta.outputs.should_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Instalar dependências do MkDocs
        run: pip install -r requirements-docs.txt

      - name: Gerar log do push no histórico
        env:
          PUSH_BEFORE: ${{ github.event.before }}
        run: python scripts/generate_push_log.py

      - name: Commitar histórico (quando houver mudanças)
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: registrar push no histórico MkDocs [skip ci]"
          file_pattern: docs/historico/**
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Build MkDocs
        run: python -m mkdocs build --strict

      - name: Aviso — Pages só publica na main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::notice::Upload artifact e Deploy do GitHub Pages só rodam na branch main (ref atual: ${{ github.ref_name }})."
          echo "::notice::Faça merge de ${{ github.ref_name }} → main e ative Settings → Pages → Source: GitHub Actions."

      - name: Upload artifact (Pages)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Meta
        id: meta
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Publicar GitHub Pages
    needs: register-and-build
    if: needs.register-and-build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
