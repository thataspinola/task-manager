name: BFF - Deploy develop

on:
  pull_request:
    branches:
      - develop
    types:
      - closed
    paths:
      - 'bff/**'
      - '.github/workflows/bff-*.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bff-deploy-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: bff

jobs:
  prepare:
    name: "1/6 - Prepare"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.prepare.outputs.should_run }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
    steps:
      - name: Decide if workflow should continue
        id: prepare
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          PR_MERGED="${{ github.event.pull_request.merged }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          if [ "$PR_MERGED" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$BASE_REF" != "develop" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$HEAD_REF" in
            feature/*|fix/*) ;;
            *)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          if [ -n "$MERGE_SHA" ]; then
            echo "target_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "target_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: "2/6 - Lint"
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check

  build:
    name: "3/6 - Build"
    runs-on: ubuntu-latest
    needs: [prepare, lint]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  test:
    name: "4/6 - Test"
    runs-on: ubuntu-latest
    needs: [prepare, lint, build]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Testes automatizados
        run: npm test

  create-release-pr:
    name: "5/6 - Create or update PR promote/* -> release/*"
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    env:
      GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AUTOMATION_TOKEN || github.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create or update release and promote branches
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          SOURCE_BRANCH="develop"
          BASELINE_BRANCH="main"
          HOM_WORKFLOW_PATH=".github/workflows/bff-deploy-hom.yml"
          PROD_WORKFLOW_PATH=".github/workflows/bff-deploy-prod.yml"

          git fetch origin --prune

          increment_patch() {
            node -e "
              const raw = process.argv[1] || '0.0.0';
              const v = raw.split('.').map(n => Number(n || 0));
              while (v.length < 3) v.push(0);
              v[2] += 1;
              console.log(v.slice(0,3).join('.'));
            " "$1"
          }

          version_gt() {
            node -e "
              const parse = s => (s || '0.0.0').split('.').map(n => Number(n || 0)).concat([0,0,0]).slice(0,3);
              const a = parse(process.argv[1]);
              const b = parse(process.argv[2]);
              for (let i = 0; i < 3; i++) {
                if (a[i] > b[i]) process.exit(0);
                if (a[i] < b[i]) process.exit(1);
              }
              process.exit(1);
            " "$1" "$2"
          }

          max_version() {
            local current="$1"
            shift
            for candidate in "$@"; do
              [ -z "$candidate" ] && continue
              if version_gt "$candidate" "$current"; then
                current="$candidate"
              fi
            done
            echo "$current"
          }

          open_release_branch() {
            gh pr list --repo "$REPO" --state open --json baseRefName,headRefName --jq '.[] | select((.baseRefName | startswith("release/")) and (.headRefName | startswith("promote/"))) | .baseRefName' | head -n 1 || true
          }

          open_main_release_branch() {
            gh pr list --repo "$REPO" --state open --base main --json headRefName --jq '[.[] | select(.headRefName | startswith("release/")) | .headRefName][0] // empty' || true
          }

          # Uma única release por ciclo (API e BFF compartilham a mesma versão).
          resolve_version() {
            local package_json="$1"
            local attempt open_rel open_main package_version highest ahead

            for attempt in $(seq 1 8); do
              git fetch origin --prune

              open_rel="$(open_release_branch)"
              if [ -n "$open_rel" ]; then
                echo "${open_rel#release/}"
                return 0
              fi

              open_main="$(open_main_release_branch)"
              if [ -n "$open_main" ]; then
                echo "${open_main#release/}"
                return 0
              fi

              package_version="$(node -p "require('./${package_json}').version")"
              highest="$package_version"
              while IFS= read -r version; do
                [ -z "$version" ] && continue
                highest="$(max_version "$highest" "$version")"
              done <<< "$(git ls-remote --heads origin 'refs/heads/release/*' 'refs/heads/promote/*' | awk -F'/' '{print $NF}')"

              ahead=0
              if git ls-remote --exit-code --heads origin "release/${highest}" >/dev/null 2>&1; then
                git fetch origin "release/${highest}" main 2>/dev/null || true
                ahead="$(git rev-list --count "origin/main..origin/release/${highest}" 2>/dev/null || echo 0)"
              fi

              # Release já existe e ainda não entrou em main → reutilizar (evita 0.0.6 e 0.0.7).
              if [ "${ahead:-0}" -gt 0 ]; then
                echo "$highest"
                return 0
              fi

              # Promote órfã sem release correspondente → reutilizar a mesma versão.
              if git ls-remote --exit-code --heads origin "promote/${highest}" >/dev/null 2>&1 \
                && ! git ls-remote --exit-code --heads origin "release/${highest}" >/dev/null 2>&1; then
                echo "$highest"
                return 0
              fi

              # Precisa de versão nova. Aguarda jitter e confere de novo (corrida API↔BFF).
              if [ "$attempt" -lt 8 ]; then
                sleep $((1 + (attempt % 3) + (RANDOM % 3)))
                open_rel="$(open_release_branch)"
                if [ -n "$open_rel" ]; then
                  echo "${open_rel#release/}"
                  return 0
                fi
                if git ls-remote --exit-code --heads origin "release/$(increment_patch "$highest")" >/dev/null 2>&1; then
                  continue
                fi
              fi

              echo "$(increment_patch "$highest")"
              return 0
            done
          }

          ensure_pr() {
            local head_branch="$1"
            local base_branch="$2"
            local title="$3"
            local body="$4"
            local pr_number
            pr_number="$(gh pr list --repo "$REPO" --state open --base "$base_branch" --head "$head_branch" --json number --jq '.[0].number // empty')"

            if [ -n "$pr_number" ]; then
              gh pr edit "$pr_number" --repo "$REPO" --title "$title" --body "$body"
            else
              gh pr create --repo "$REPO" --base "$base_branch" --head "$head_branch" --title "$title" --body "$body"
            fi
          }

          VERSION="$(resolve_version "bff/package.json")"
          echo "Versão de release compartilhada: ${VERSION}"

          RELEASE_BRANCH="release/${VERSION}"
          PROMOTE_BRANCH="promote/${VERSION}"

          ensure_package_version() {
            local target_version="$1"
            local current_version
            current_version="$(node -p "require('./bff/package.json').version")"

            if [ "$current_version" != "$target_version" ]; then
              npm version "$target_version" --no-git-tag-version --prefix bff
            else
              echo "package.json já está na versão ${target_version}; a atualização será ignorada."
            fi
          }

          prepare_release_workdir() {
            git fetch origin "${RELEASE_BRANCH}" "${SOURCE_BRANCH}" "${BASELINE_BRANCH}" 2>/dev/null || true
            if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
              git checkout -B "$RELEASE_BRANCH" "origin/$RELEASE_BRANCH"
            else
              git checkout -B "$RELEASE_BRANCH" "origin/$BASELINE_BRANCH"
            fi

            if git cat-file -e "origin/${SOURCE_BRANCH}:${HOM_WORKFLOW_PATH}" 2>/dev/null; then
              git -C "${{ github.workspace }}" checkout "origin/${SOURCE_BRANCH}" -- "${HOM_WORKFLOW_PATH}"
            fi
            if git cat-file -e "origin/${SOURCE_BRANCH}:${PROD_WORKFLOW_PATH}" 2>/dev/null; then
              git -C "${{ github.workspace }}" checkout "origin/${SOURCE_BRANCH}" -- "${PROD_WORKFLOW_PATH}"
            fi

            ensure_package_version "${VERSION}"
            git add bff/package.json bff/package-lock.json
            git -C "${{ github.workspace }}" add "${HOM_WORKFLOW_PATH}" "${PROD_WORKFLOW_PATH}" || true
            git commit --allow-empty -m "chore(release): sync ${VERSION} [skip ci]"
          }

          # release/* e promote/*: ruleset bloqueia force-push. API/BFF podem correr na mesma ref.
          push_release_sync_retry() {
            local max=8
            local i
            for i in $(seq 1 "$max"); do
              prepare_release_workdir
              if git push -u origin "$RELEASE_BRANCH"; then
                return 0
              fi
              echo "Concorrência ao atualizar ${RELEASE_BRANCH} (tentativa ${i}/${max}); refetch e retry."
              sleep $((i + 1))
            done
            echo "::error::Falha ao atualizar ${RELEASE_BRANCH} após ${max} tentativas."
            return 1
          }

          # Commit filho do tip atual da branch com a árvore exata de tree_ref (sem merge).
          push_aligned_tree() {
            local branch="$1"
            local tree_ref="$2"
            local message="$3"
            local max=8
            local i parent_sha tree_sha new_sha

            export GIT_AUTHOR_NAME="github-actions[bot]"
            export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
            export GIT_COMMITTER_NAME="${GIT_AUTHOR_NAME}"
            export GIT_COMMITTER_EMAIL="${GIT_AUTHOR_EMAIL}"

            tree_sha="$(git rev-parse "${tree_ref}^{tree}")"

            for i in $(seq 1 "$max"); do
              git fetch origin "$branch" 2>/dev/null || true
              if ! git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
                echo "::error::Branch remota ${branch} não existe para alinhar."
                return 1
              fi
              parent_sha="$(git rev-parse "origin/${branch}")"
              if [ "$(git rev-parse "${parent_sha}^{tree}")" = "$tree_sha" ]; then
                echo "Árvore de ${branch} já alinhada com ${tree_ref}."
                return 0
              fi
              new_sha="$(git commit-tree "$tree_sha" -p "$parent_sha" -m "$message")"
              if git push origin "${new_sha}:refs/heads/${branch}"; then
                git fetch origin "$branch"
                return 0
              fi
              echo "Concorrência ao alinhar ${branch} (tentativa ${i}/${max})."
              sleep $((i + 1))
            done
            echo "::error::Falha ao alinhar ${branch} após ${max} tentativas."
            return 1
          }

          # Atualiza promote sem rewrite; re-aplica version bump sobre o tip remoto mais recente.
          sync_promote_from_develop() {
            local max=8
            local i

            for i in $(seq 1 "$max"); do
              git fetch origin "${SOURCE_BRANCH}"
              git fetch origin "${PROMOTE_BRANCH}" 2>/dev/null || true

              if git ls-remote --exit-code --heads origin "${PROMOTE_BRANCH}" >/dev/null 2>&1; then
                if ! git merge-base --is-ancestor "origin/${SOURCE_BRANCH}" "origin/${PROMOTE_BRANCH}"; then
                  echo "Alinhando ${PROMOTE_BRANCH} com a árvore de ${SOURCE_BRANCH}."
                  push_aligned_tree "${PROMOTE_BRANCH}" "origin/${SOURCE_BRANCH}" \
                    "chore(promote): sync ${SOURCE_BRANCH} into ${PROMOTE_BRANCH} [skip ci]"
                  git fetch origin "${PROMOTE_BRANCH}"
                fi
                git checkout -B "${PROMOTE_BRANCH}" "origin/${PROMOTE_BRANCH}"
              else
                git checkout -B "${PROMOTE_BRANCH}" "origin/${SOURCE_BRANCH}"
              fi

              ensure_package_version "${VERSION}"
              git add bff/package.json bff/package-lock.json
              git commit --allow-empty -m "chore(promote): ${VERSION} [skip ci]"

              if git push -u origin "${PROMOTE_BRANCH}"; then
                return 0
              fi
              echo "Concorrência ao atualizar ${PROMOTE_BRANCH} (tentativa ${i}/${max}); refetch e retry."
              sleep $((i + 1))
            done
            echo "::error::Falha ao atualizar ${PROMOTE_BRANCH} após ${max} tentativas."
            return 1
          }

          # Consolida tudo em release/<version> (sem force-push / sem merge conflitante).
          consolidate_into_release() {
            local max=8
            local i r_sha p_sha

            for i in $(seq 1 "$max"); do
              git fetch origin "${SOURCE_BRANCH}" "${RELEASE_BRANCH}" "${PROMOTE_BRANCH}"
              r_sha="$(git rev-parse "origin/${RELEASE_BRANCH}")"
              p_sha="$(git rev-parse "origin/${PROMOTE_BRANCH}")"

              if [ "$r_sha" = "$p_sha" ]; then
                echo "release e promote já estão na mesma tip."
                break
              elif git merge-base --is-ancestor "$p_sha" "$r_sha"; then
                echo "release já contém promote."
                break
              elif git merge-base --is-ancestor "$r_sha" "$p_sha"; then
                echo "promote contém release; avançando release via fast-forward."
                if git push origin "refs/heads/${PROMOTE_BRANCH}:refs/heads/${RELEASE_BRANCH}"; then
                  break
                fi
                echo "Concorrência no fast-forward de ${RELEASE_BRANCH} (tentativa ${i}/${max})."
                sleep $((i + 1))
                continue
              else
                echo "Branches divergiram; alinhando árvore de ${RELEASE_BRANCH} com ${PROMOTE_BRANCH}."
                push_aligned_tree "${RELEASE_BRANCH}" "origin/${PROMOTE_BRANCH}" \
                  "chore(release): alinhar com ${PROMOTE_BRANCH} [skip ci]"
                break
              fi
            done

            echo "Sincronizando ${PROMOTE_BRANCH} com ${SOURCE_BRANCH} para o PR."
            sync_promote_from_develop
          }

          push_release_sync_retry
          sync_promote_from_develop
          consolidate_into_release

          ensure_pr "$PROMOTE_BRANCH" "$RELEASE_BRANCH" "develop → ${RELEASE_BRANCH}" "PR automático criado após validação em DEV para equalizar develop com main antes do fluxo em HOM."

          # Se promote→release já foi mergeado e o HOM não rodou (paths/trigger), dispara agora.
          dispatch_hom_if_promote_merged() {
            local open_pr merged_pr
            open_pr="$(gh pr list --repo "$REPO" --state open --base "$RELEASE_BRANCH" --head "$PROMOTE_BRANCH" --json number --jq '.[0].number // empty')"
            if [ -n "$open_pr" ]; then
              echo "PR promote→release #${open_pr} ainda aberto; HOM aguarda o merge."
              return 0
            fi
            merged_pr="$(gh pr list --repo "$REPO" --state merged --base "$RELEASE_BRANCH" --head "$PROMOTE_BRANCH" --limit 1 --json number --jq '.[0].number // empty')"
            if [ -z "$merged_pr" ]; then
              echo "Nenhum merge promote→release encontrado ainda."
              return 0
            fi
            echo "PR #${merged_pr} já mergeado; disparando Deploy Homol para ${RELEASE_BRANCH}."
            git fetch origin "${RELEASE_BRANCH}"
            TIP="$(git rev-parse "origin/${RELEASE_BRANCH}")"
            gh workflow run "BFF - Deploy Homol" --repo "$REPO" \
              -f "release_branch=${RELEASE_BRANCH}" \
              -f "target_sha=${TIP}" || \
              echo "::warning::Não foi possível disparar BFF - Deploy Homol."
          }

          dispatch_hom_if_promote_merged

  finish:
    name: "6/6 - Finish"
    runs-on: ubuntu-latest
    needs: [prepare, create-release-pr]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - run: echo "Fluxo DEV concluído."
        working-directory: .
