name: BFF - Deploy develop

on:
  pull_request:
    branches:
      - develop
    types:
      - closed
    paths:
      - 'bff/**'
      - '.github/workflows/bff-*.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bff-deploy-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    working-directory: bff

jobs:
  prepare:
    name: "1/6 - Prepare"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.prepare.outputs.should_run }}
      target_sha: ${{ steps.prepare.outputs.target_sha }}
    steps:
      - name: Decide if workflow should continue
        id: prepare
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          PR_MERGED="${{ github.event.pull_request.merged }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"

          if [ "$PR_MERGED" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$BASE_REF" != "develop" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$HEAD_REF" in
            feature/*|fix/*) ;;
            *)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          if [ -n "$MERGE_SHA" ]; then
            echo "target_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "target_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: "2/6 - Lint"
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check

  build:
    name: "3/6 - Build"
    runs-on: ubuntu-latest
    needs: [prepare, lint]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  test:
    name: "4/6 - Test"
    runs-on: ubuntu-latest
    needs: [prepare, lint, build]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Testes automatizados
        run: npm test

  create-release-pr:
    name: "5/6 - Create or update PR promote/* -> release/*"
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    env:
      GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AUTOMATION_TOKEN || github.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create or update release and promote branches
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          SOURCE_BRANCH="develop"
          BASELINE_BRANCH="main"
          HOM_WORKFLOW_PATH=".github/workflows/bff-deploy-hom.yml"
          PROD_WORKFLOW_PATH=".github/workflows/bff-deploy-prod.yml"

          git fetch origin --prune

          increment_patch() {
            node -e "
              const raw = process.argv[1] || '0.0.0';
              const v = raw.split('.').map(n => Number(n || 0));
              while (v.length < 3) v.push(0);
              v[2] += 1;
              console.log(v.slice(0,3).join('.'));
            " "$1"
          }

          version_gt() {
            node -e "
              const parse = s => (s || '0.0.0').split('.').map(n => Number(n || 0)).concat([0,0,0]).slice(0,3);
              const a = parse(process.argv[1]);
              const b = parse(process.argv[2]);
              for (let i = 0; i < 3; i++) {
                if (a[i] > b[i]) process.exit(0);
                if (a[i] < b[i]) process.exit(1);
              }
              process.exit(1);
            " "$1" "$2"
          }

          max_version() {
            local current="$1"
            shift
            for candidate in "$@"; do
              [ -z "$candidate" ] && continue
              if version_gt "$candidate" "$current"; then
                current="$candidate"
              fi
            done
            echo "$current"
          }

          open_release_branch() {
            gh pr list --repo "$REPO" --state open --json baseRefName,headRefName --jq '.[] | select((.baseRefName | startswith("release/")) and (.headRefName | startswith("promote/"))) | .baseRefName' | head -n 1 || true
          }

          ensure_pr() {
            local head_branch="$1"
            local base_branch="$2"
            local title="$3"
            local body="$4"
            local pr_number
            pr_number="$(gh pr list --repo "$REPO" --state open --base "$base_branch" --head "$head_branch" --json number --jq '.[0].number // empty')"

            if [ -n "$pr_number" ]; then
              gh pr edit "$pr_number" --repo "$REPO" --title "$title" --body "$body"
            else
              gh pr create --repo "$REPO" --base "$base_branch" --head "$head_branch" --title "$title" --body "$body"
            fi
          }

          OPEN_RELEASE_BRANCH="$(open_release_branch)"

          if [ -n "$OPEN_RELEASE_BRANCH" ]; then
            VERSION="${OPEN_RELEASE_BRANCH#release/}"
          else
            PACKAGE_VERSION="$(node -p "require('./bff/package.json').version")"
            REMOTE_VERSIONS="$(git ls-remote --heads origin 'refs/heads/release/*' 'refs/heads/promote/*' | awk -F'/' '{print $NF}')"
            HIGHEST_VERSION="$PACKAGE_VERSION"
            while IFS= read -r version; do
              [ -z "$version" ] && continue
              HIGHEST_VERSION="$(max_version "$HIGHEST_VERSION" "$version")"
            done <<< "$REMOTE_VERSIONS"
            VERSION="$(increment_patch "$HIGHEST_VERSION")"
          fi

          RELEASE_BRANCH="release/${VERSION}"
          PROMOTE_BRANCH="promote/${VERSION}"

          if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
            git checkout -B "$RELEASE_BRANCH" "origin/$RELEASE_BRANCH"
          else
            git checkout -B "$RELEASE_BRANCH" "origin/$BASELINE_BRANCH"
          fi

          if git cat-file -e "origin/${SOURCE_BRANCH}:${HOM_WORKFLOW_PATH}" 2>/dev/null; then
            git -C "${{ github.workspace }}" checkout "origin/${SOURCE_BRANCH}" -- "${HOM_WORKFLOW_PATH}"
          fi

          if git cat-file -e "origin/${SOURCE_BRANCH}:${PROD_WORKFLOW_PATH}" 2>/dev/null; then
            git -C "${{ github.workspace }}" checkout "origin/${SOURCE_BRANCH}" -- "${PROD_WORKFLOW_PATH}"
          fi

          ensure_package_version() {
            local target_version="$1"
            local current_version
            current_version="$(node -p "require('./bff/package.json').version")"

            if [ "$current_version" != "$target_version" ]; then
              npm version "$target_version" --no-git-tag-version --prefix bff
            else
              echo "package.json já está na versão ${target_version}; a atualização será ignorada."
            fi
          }

          ensure_package_version "${VERSION}"
          git add bff/package.json bff/package-lock.json
          git -C "${{ github.workspace }}" add "${HOM_WORKFLOW_PATH}" "${PROD_WORKFLOW_PATH}" || true
          git commit --allow-empty -m "chore(release): sync ${VERSION} [skip ci]"
          # release/* e promote/*: ruleset bloqueia force-push e costuma bloquear delete.
          git push -u origin "$RELEASE_BRANCH"

          # Commit filho de parent_ref com a árvore exata de tree_ref (sem merge → sem conflitos).
          push_aligned_tree() {
            local branch="$1"
            local parent_ref="$2"
            local tree_ref="$3"
            local message="$4"
            local parent_sha tree_sha new_sha

            parent_sha="$(git rev-parse "$parent_ref")"
            tree_sha="$(git rev-parse "${tree_ref}^{tree}")"

            if [ "$(git rev-parse "${parent_ref}^{tree}")" = "$tree_sha" ]; then
              echo "Árvore de ${branch} já alinhada com ${tree_ref}."
              return 0
            fi

            export GIT_AUTHOR_NAME="github-actions[bot]"
            export GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
            export GIT_COMMITTER_NAME="${GIT_AUTHOR_NAME}"
            export GIT_COMMITTER_EMAIL="${GIT_AUTHOR_EMAIL}"

            new_sha="$(git commit-tree "$tree_sha" -p "$parent_sha" -m "$message")"
            git push origin "${new_sha}:refs/heads/${branch}"
            git fetch origin "$branch"
          }

          # Atualiza promote sem rewrite e sem conflitos de merge.
          sync_promote_from_develop() {
            git fetch origin "${SOURCE_BRANCH}"
            git fetch origin "${PROMOTE_BRANCH}" 2>/dev/null || true

            if git ls-remote --exit-code --heads origin "${PROMOTE_BRANCH}" >/dev/null 2>&1; then
              if ! git merge-base --is-ancestor "origin/${SOURCE_BRANCH}" "origin/${PROMOTE_BRANCH}"; then
                echo "Alinhando ${PROMOTE_BRANCH} com a árvore de ${SOURCE_BRANCH}."
                push_aligned_tree "${PROMOTE_BRANCH}" "origin/${PROMOTE_BRANCH}" "origin/${SOURCE_BRANCH}" \
                  "chore(promote): sync ${SOURCE_BRANCH} into ${PROMOTE_BRANCH} [skip ci]"
              fi
              git checkout -B "${PROMOTE_BRANCH}" "origin/${PROMOTE_BRANCH}"
            else
              git checkout -B "${PROMOTE_BRANCH}" "origin/${SOURCE_BRANCH}"
            fi

            ensure_package_version "${VERSION}"
            git add bff/package.json bff/package-lock.json
            git commit --allow-empty -m "chore(promote): ${VERSION} [skip ci]"
            git push -u origin "${PROMOTE_BRANCH}"
          }

          # Consolida tudo em release/<version> (sem force-push / sem merge conflitante).
          consolidate_into_release() {
            git fetch origin "${SOURCE_BRANCH}" "${RELEASE_BRANCH}" "${PROMOTE_BRANCH}"
            local r_sha p_sha
            r_sha="$(git rev-parse "origin/${RELEASE_BRANCH}")"
            p_sha="$(git rev-parse "origin/${PROMOTE_BRANCH}")"

            if [ "$r_sha" = "$p_sha" ]; then
              echo "release e promote já estão na mesma tip."
            elif git merge-base --is-ancestor "$p_sha" "$r_sha"; then
              echo "release já contém promote."
            elif git merge-base --is-ancestor "$r_sha" "$p_sha"; then
              echo "promote contém release; avançando release via fast-forward."
              git push origin "refs/heads/${PROMOTE_BRANCH}:refs/heads/${RELEASE_BRANCH}"
            else
              echo "Branches divergiram; alinhando árvore de ${RELEASE_BRANCH} com ${PROMOTE_BRANCH}."
              push_aligned_tree "${RELEASE_BRANCH}" "origin/${RELEASE_BRANCH}" "origin/${PROMOTE_BRANCH}" \
                "chore(release): alinhar com ${PROMOTE_BRANCH} [skip ci]"
            fi

            echo "Sincronizando ${PROMOTE_BRANCH} com ${SOURCE_BRANCH} para o PR."
            sync_promote_from_develop
          }

          sync_promote_from_develop
          consolidate_into_release

          ensure_pr "$PROMOTE_BRANCH" "$RELEASE_BRANCH" "develop → ${RELEASE_BRANCH}" "PR automático criado após validação em DEV para equalizar develop com main antes do fluxo em HOM."

  finish:
    name: "6/6 - Finish"
    runs-on: ubuntu-latest
    needs: [prepare, create-release-pr]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - run: echo "Fluxo DEV concluído."
        working-directory: .
