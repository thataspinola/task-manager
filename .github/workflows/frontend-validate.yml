name: Frontend - Validate

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-*.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: frontend-validate-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  prepare:
    name: "1/6 - Prepare"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.prepare.outputs.should_run }}
      sonar_enabled: ${{ steps.sonar_cfg.outputs.sonar_enabled }}
    steps:
      - name: Decide if workflow should continue
        id: prepare
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          case "${{ github.ref_name}}" in
            feature/*|fix/*) echo "should_run=true" >> $GITHUB_OUTPUT;;
            *) echo "should_run=false" >> $GITHUB_OUTPUT;;
          esac

      - name: Check Sonar secrets
        id: sonar_cfg
        shell: bash
        working-directory: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_HOST_URL}" ]; then
            echo "sonar_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_HOST_URL/SONAR_TOKEN ausentes — job Sonar será ignorado."
            exit 0
          fi
          case "${SONAR_HOST_URL}" in
            *localhost*|*127.0.0.1*|*\[::1\]*|*0.0.0.0*)
              echo "sonar_enabled=false" >> "$GITHUB_OUTPUT"
              echo "::notice::SONAR_HOST_URL aponta para localhost — job Sonar será ignorado no CI."
              ;;
            *)
              echo "sonar_enabled=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  lint:
    name: "2/6 - Lint"
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check

  build:
    name: "3/6 - Build"
    runs-on: ubuntu-latest
    needs: [prepare, lint]
    if: needs.prepare.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  test:
    name: "4/6 - Test"
    runs-on: ubuntu-latest
    needs: [prepare, lint, build]
    if: needs.prepare.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Testes unitários
        run: npm run test:unit

  sonar:
    name: "5/6 - SonarQube"
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: needs.prepare.outputs.should_run == 'true' && needs.prepare.outputs.sonar_enabled == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:unit
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend

  create-dev-pr:
    name: "6/6 - Create or update PR to develop"
    runs-on: ubuntu-latest
    needs: [prepare, lint, build, test, sonar]
    if: always() && needs.prepare.outputs.should_run == 'true' && needs.lint.result == 'success' && needs.build.result == 'success' && needs.test.result == 'success' && (needs.sonar.result == 'success' || needs.sonar.result == 'skipped')
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: "Create or update PR"
        continue-on-error: true
        shell: bash
        working-directory: .
        run: |
          set +e
          set -uo pipefail
          REPO="${{ github.repository }}"
          HEAD="${{ github.ref_name }}"
          BASE="develop"

          case "$HEAD" in
            feature/*) TITLE="feature/${HEAD#feature/} → develop" ;;
            fix/*) TITLE="fix/${HEAD#fix/} → develop" ;;
            *) TITLE="${HEAD} → develop" ;;
          esac

          if ! git ls-remote --exit-code --heads origin "$BASE" >/dev/null 2>&1; then
            echo "::notice::Branch base '$BASE' não existe no remoto; PR não será criado."
            exit 0
          fi

          if ! git ls-remote --exit-code --heads origin "$HEAD" >/dev/null 2>&1; then
            echo "::notice::Branch head '$HEAD' não existe no remoto; PR não será criado."
            exit 0
          fi

          git fetch origin "$BASE" "$HEAD"

          AHEAD="$(git rev-list --count "origin/$BASE..origin/$HEAD")"
          echo "Commits em ${HEAD} à frente de ${BASE}: ${AHEAD}"

          PR_NUMBER="$(gh pr list --repo "$REPO" --state open --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // empty')"

          if [ "$AHEAD" -eq 0 ]; then
            echo "::notice::Não há commits únicos em ${HEAD} relativamente a ${BASE}; PR não será criado/atualizado."
            exit 0
          fi

          if [ -n "$PR_NUMBER" ]; then
            if gh pr edit "$PR_NUMBER" --repo "$REPO" --title "$TITLE" --body "PR automático criado após validação com sucesso."; then
              echo "PR #$PR_NUMBER atualizado."
              exit 0
            fi
            echo "::warning::Não foi possível atualizar o PR #$PR_NUMBER (permissão do token)."
            exit 0
          fi

          if gh pr create --repo "$REPO" --base "$BASE" --head "$HEAD" --title "$TITLE" --body "PR automático criado após validação com sucesso."; then
            echo "PR criado com sucesso."
            exit 0
          fi

          echo "::warning::Não foi possível criar o PR automaticamente (token sem createPullRequest)."
          echo "::notice::Abra manualmente: https://github.com/${REPO}/compare/${BASE}...${HEAD}?expand=1"
          echo "::notice::Settings → Actions → Workflow permissions → Read and write permissions."
          exit 0
