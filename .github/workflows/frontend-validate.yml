name: Frontend - Validate

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-*.yml"

permissions:
  contents: read

concurrency:
  group: frontend-validate-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  prepare:
    name: "1/5 - Prepare"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.prepare.outputs.should_run }}
      sonar_enabled: ${{ steps.sonar_cfg.outputs.sonar_enabled }}
    steps:
      - name: Decide if workflow should continue
        id: prepare
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          case "${{ github.ref_name}}" in
            feature/*|fix/*) echo "should_run=true" >> $GITHUB_OUTPUT;;
            *) echo "should_run=false" >> $GITHUB_OUTPUT;;
          esac

      - name: Check Sonar secrets
        id: sonar_cfg
        shell: bash
        working-directory: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_HOST_URL}" ]; then
            echo "sonar_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_HOST_URL/SONAR_TOKEN ausentes — job Sonar será ignorado."
            exit 0
          fi
          case "${SONAR_HOST_URL}" in
            *localhost*|*127.0.0.1*|*\[::1\]*|*0.0.0.0*)
              echo "sonar_enabled=false" >> "$GITHUB_OUTPUT"
              echo "::notice::SONAR_HOST_URL aponta para localhost — job Sonar será ignorado no CI."
              ;;
            *)
              echo "sonar_enabled=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  lint:
    name: "2/5 - Lint"
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check

  build:
    name: "3/5 - Build"
    runs-on: ubuntu-latest
    needs: [prepare, lint]
    if: needs.prepare.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  test:
    name: "4/5 - Test"
    runs-on: ubuntu-latest
    needs: [prepare, lint, build]
    if: needs.prepare.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Testes unitários
        run: npm run test:unit

  sonar:
    name: "5/5 - SonarQube"
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: needs.prepare.outputs.should_run == 'true' && needs.prepare.outputs.sonar_enabled == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:unit
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend
