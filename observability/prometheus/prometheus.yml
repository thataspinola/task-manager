global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: task-manager-api
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3001
        labels:
          service: api

  - job_name: task-manager-bff
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3002
        labels:
          service: bff
