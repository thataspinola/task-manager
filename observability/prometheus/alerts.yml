groups:
  - name: task-manager
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Target {{ $labels.job }} down"
          description: "{{ $labels.instance }} não responde ao scrape Prometheus."

      - alert: HighHttp5xxRate
        expr: |
          sum by (service) (
            rate(http_requests_seconds_count{status=~"5.."}[5m])
          )
          /
          clamp_min(
            sum by (service) (rate(http_requests_seconds_count[5m])),
            0.001
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Taxa de 5xx alta em {{ $labels.service }}"
          description: "Mais de 5% das requisições estão retornando 5xx."

      - alert: HighHttpLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(http_requests_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Latência p95 alta em {{ $labels.service }}"
          description: "p95 acima de 1s nos últimos 5 minutos."

      - alert: AppHealthDegraded
        expr: app_health_status == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Health degradado ({{ $labels.component }})"
          description: "O componente {{ $labels.component }} do serviço {{ $labels.service }} está unhealthy."
