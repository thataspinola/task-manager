route:
  receiver: default-webhook
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-webhook
    webhook_configs:
      # Slack Incoming Webhook, Discord, etc. — defina ALERT_WEBHOOK_URL no .env do compose
      - url: "http://127.0.0.1:9/ignore"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity=critical
    target_matchers:
      - severity=warning
    equal: [alertname, service]
