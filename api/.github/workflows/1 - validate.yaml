name: Validate Shell

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-${{ github.ref_name }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

jobs:
  prepare:
    name: "1/5 - Prepare"
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.prepare.outputs.should_run }}
    steps:
      - name: Decide if workflow should continue
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.ref_name}}" in
            feature/*|fix/*) echo "should_run=true" >> $GITHUB_OUTPUT;;
            *) echo "should_run=false" >> $GITHUB_OUTPUT;;
          esac

  lint:
    name: "2/5 - Lint"
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run format:check

  build:
    name: "3/5 - Build"
    runs-on: ubuntu-latest
    needs: [prepare, lint]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run prisma:generate
      - run: npm run build

  test:
    name: "4/5 - Test"
    runs-on: ubuntu-latest
    needs: [prepare, lint, build]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run prisma:generate
      - name: Testes unitários
        run: npm run test:unit
      - name: Testes e2e
        run: npm run test:e2e

  create-dev-pr:
    name: "5/5 - Create or update PR to develop"
    runs-on: ubuntu-latest
    needs: [prepare, lint, build, test]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    env:
      GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.AUTOMATION_TOKEN || github.token }}
      - name: "Create or update PR"
        shell: bash
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          HEAD="${{ github.ref_name }}"
          BASE="develop"

          case "$HEAD" in
            feature/*) TITLE="feature/${HEAD#feature/} → develop" ;;
            fix/*) TITLE="fix/${HEAD#fix/} → develop" ;;
            *) TITLE="${HEAD} → develop" ;;
          esac

          if ! git ls-remote --exit-code --heads origin "$BASE" >/dev/null 2>&1; then
            echo "::notice::Branch base '$BASE' não existe no remoto; PR não será criado."
            exit 0
          fi

          if ! git ls-remote --exit-code --heads origin "$HEAD" >/dev/null 2>&1; then
            echo "::notice::Branch head '$HEAD' não existe no remoto; PR não será criado."
            exit 0
          fi

          git fetch origin "$BASE" "$HEAD"

          AHEAD="$(git rev-list --count "origin/$BASE..origin/$HEAD")"
          echo "Commits em ${HEAD} à frente de ${BASE}: ${AHEAD}"

          PR_NUMBER="$(gh pr list --repo "$REPO" --state open --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // empty')"

          if [ "$AHEAD" -eq 0 ]; then
            echo "::notice::Não há commits únicos em ${HEAD} relativamente a ${BASE}; PR não será criado/atualizado."
            exit 0
          fi

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --title "$TITLE" --body "PR automático criado após validação com sucesso."
            exit 0
          fi

          gh pr create --repo "$REPO" --base "$BASE" --head "$HEAD" --title "$TITLE" --body "PR automático criado após validação com sucesso."
